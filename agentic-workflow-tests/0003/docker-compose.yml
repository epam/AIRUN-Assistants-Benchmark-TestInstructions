networks:
  agentic-0003-net:
    driver: bridge

services:
  wiremock:
    image: "wiremock/wiremock:latest"
    container_name: agentic-0003-wiremock
    volumes:
      - ./extensions:/var/wiremock/extensions
      - ./__files:/home/wiremock/__files
      - ./mappings:/home/wiremock/mappings
    entrypoint: ["/docker-entrypoint.sh", "--global-response-templating", "--disable-gzip", "--verbose"]
    restart: always
    networks:
      - agentic-0003-net
    ports:
      - 50080:8080

  mysql:
    image: mysql:8.0
    container_name: agentic-0003-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    restart: always
    networks:
      - agentic-0003-net
    environment:
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
        MYSQL_DATABASE: ${MYSQL_DATABASE:-golf_db}
        MYSQL_USER: ${MYSQL_USER:-golf_user}
        MYSQL_PASSWORD: ${MYSQL_PASSWORD:-golf_pass}
    ports:
        - "${MYSQL_PORT:-3306}:3306"
    volumes:
        - mysql_data:/var/lib/mysql

volumes:
  mysql_data: